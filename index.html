<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛知県 後期高齢者医療保険料試算 令和8年度</title>

<style>
body{
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:#f3f6fb;
  margin:0;
  padding:20px;
  color:#222;
}
.container{
  max-width:1000px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:14px;
  box-shadow:0 4px 18px rgba(0,0,0,.08);
}
h1{
  font-size:24px;
  border-left:7px solid #2563eb;
  padding-left:12px;
}
h2{
  margin-top:0;
}
.notice{
  background:#fff7df;
  border-left:5px solid #f59e0b;
  padding:12px;
  margin:16px 0;
  font-size:14px;
}
.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:16px;
  margin:16px 0;
  background:#fafafa;
}
.grid{
  display:grid;
  grid-template-columns:190px 1fr;
  gap:10px;
  align-items:center;
}
input{
  padding:10px;
  font-size:16px;
}
.checkbox{
  width:20px;
  height:20px;
}
button{
  width:100%;
  padding:14px;
  margin-top:12px;
  font-size:18px;
  font-weight:bold;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.print-btn{
  background:#475569;
}
.result{
  margin-top:20px;
  padding:16px;
  background:#eef6ff;
  border-radius:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}
th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:right;
}
th{
  background:#e8eef7;
}
td:first-child,th:first-child{
  text-align:left;
}
.total{
  font-size:20px;
  font-weight:bold;
  color:#1d4ed8;
}
.small{
  font-size:13px;
  color:#555;
}
.basis{
  background:#f8fafc;
  border:1px solid #d0d7de;
  border-radius:8px;
  padding:12px;
  margin-top:16px;
}
@media(max-width:650px){
  .grid{
    grid-template-columns:1fr;
  }
}
@media print{
  button{
    display:none;
  }
  body{
    background:white;
  }
  .container{
    box-shadow:none;
  }
}
</style>
</head>

<body>
<div class="container">

<h1>愛知県 後期高齢者医療保険料試算（令和8年度）</h1>

<div class="notice">
この試算は概算です。実際の保険料額とは異なる場合があります。<br>
試算結果は100円未満を切り捨てて表示します。<br>
令和8年度は、医療分と子ども・子育て支援金分を合算して計算します。
</div>

<div class="card">
  <h2>世帯主</h2>
  <div class="grid">
    <label>年齢</label>
    <input type="number" id="h_age" placeholder="例：80">

    <label>年金収入（年額）</label>
    <input type="number" id="h_pension" value="0">

    <label>給与収入（年額）</label>
    <input type="number" id="h_salary" value="0">

    <label>その他の所得（年額）</label>
    <input type="number" id="h_other" value="0">

    <label>世帯主が被保険者</label>
    <input type="checkbox" id="h_insured" class="checkbox">
  </div>
</div>

<div class="card">
  <h2>家族1（被保険者）</h2>
  <div class="grid">
    <label>年齢</label>
    <input type="number" id="f1_age" placeholder="未入力なら対象外">

    <label>年金収入（年額）</label>
    <input type="number" id="f1_pension" value="0">

    <label>給与収入（年額）</label>
    <input type="number" id="f1_salary" value="0">

    <label>その他の所得（年額）</label>
    <input type="number" id="f1_other" value="0">
  </div>
</div>

<div class="card">
  <h2>家族2（被保険者）</h2>
  <div class="grid">
    <label>年齢</label>
    <input type="number" id="f2_age" placeholder="未入力なら対象外">

    <label>年金収入（年額）</label>
    <input type="number" id="f2_pension" value="0">

    <label>給与収入（年額）</label>
    <input type="number" id="f2_salary" value="0">

    <label>その他の所得（年額）</label>
    <input type="number" id="f2_other" value="0">
  </div>
</div>

<button onclick="calculate()">試算する</button>
<button onclick="window.print()" class="print-btn">印刷・PDF保存</button>

<div id="result" class="result">
ここに試算結果が表示されます。
</div>

<p class="small">
令和8年度料率：医療分 均等割56,130円・所得割率10.48％・限度額850,000円。
子ども分 均等割1,362円・所得割率0.25％・限度額21,000円。
</p>

</div>

<script>
const CONFIG = {
  medicalEqual: 56130,
  medicalRate: 0.1048,
  medicalLimit: 850000,

  childEqual: 1362,
  childRate: 0.0025,
  childLimit: 21000,

  basicDeduction: 430000
};

function num(id){
  return Number(document.getElementById(id).value || 0);
}

function checked(id){
  return document.getElementById(id).checked;
}

function yen(n){
  return Math.floor(n).toLocaleString() + "円";
}

function floor100(n){
  return Math.floor(n / 100) * 100;
}

function salaryIncome(revenue){
  if(revenue <= 550000) return 0;
  if(revenue <= 1618999) return revenue - 550000;
  if(revenue <= 1619999) return 1069000;
  if(revenue <= 1621999) return 1070000;
  if(revenue <= 1623999) return 1072000;
  if(revenue <= 1627999) return 1074000;

  const r = Math.floor(revenue / 4000) * 4000;

  if(revenue <= 1799999) return r * 0.6 + 100000;
  if(revenue <= 3599999) return r * 0.7 - 80000;
  if(revenue <= 6599999) return r * 0.8 - 440000;
  if(revenue <= 8499999) return revenue * 0.9 - 1100000;

  return revenue - 1950000;
}

function pensionIncome(age, revenue){
  if(revenue <= 0) return 0;

  if(age >= 65){
    if(revenue <= 1100000) return 0;
    if(revenue <= 3300000) return revenue - 1100000;
    if(revenue <= 4100000) return revenue * 0.75 - 275000;
    if(revenue <= 7700000) return revenue * 0.85 - 685000;
    if(revenue <= 10000000) return revenue * 0.95 - 1455000;
    return revenue - 1955000;
  }

  if(revenue <= 600000) return 0;
  if(revenue <= 1300000) return revenue - 600000;
  if(revenue <= 4100000) return revenue * 0.75 - 275000;
  if(revenue <= 7700000) return revenue * 0.85 - 685000;
  if(revenue <= 10000000) return revenue * 0.95 - 1455000;
  return revenue - 1955000;
}

function readPerson(prefix, name, insuredRule){
  const age = num(prefix + "_age");
  const pension = num(prefix + "_pension");
  const salary = num(prefix + "_salary");
  const other = num(prefix + "_other");

  let insured = false;
  if(insuredRule === "checkbox"){
    insured = checked(prefix + "_insured");
  }else{
    insured = age > 0;
  }

  const pIncome = pensionIncome(age, pension);
  const sIncome = salaryIncome(salary);
  const totalIncome = Math.max(0, pIncome + sIncome + other);
  const taxableIncome = Math.max(0, totalIncome - CONFIG.basicDeduction);

  const lightIncome = Math.max(
    0,
    totalIncome - (age >= 65 && pension > 0 ? 150000 : 0)
  );

  const salaryPensionPerson =
    salary > 550000 ||
    (age >= 65 && pension > 1250000) ||
    (age < 65 && pension > 600000);

  return {
    name,
    age,
    pension,
    salary,
    other,
    insured,
    pIncome,
    sIncome,
    totalIncome,
    taxableIncome,
    lightIncome,
    salaryPensionPerson
  };
}

function getReduction(lightIncomeTotal, insuredCount, salaryPensionCount){
  const extra = salaryPensionCount >= 2
    ? 100000 * (salaryPensionCount - 1)
    : 0;

  const limit70 = 430000 + extra;
  const limit50 = 430000 + 305000 * insuredCount + extra;
  const limit20 = 430000 + 560000 * insuredCount + extra;

  if(lightIncomeTotal <= limit70){
    return {
      label:"7割軽減＋医療分0.2割追加軽減",
      medicalRate:0.72,
      childRate:0.70,
      limit:limit70
    };
  }

  if(lightIncomeTotal <= limit50){
    return {
      label:"5割軽減",
      medicalRate:0.50,
      childRate:0.50,
      limit:limit50
    };
  }

  if(lightIncomeTotal <= limit20){
    return {
      label:"2割軽減",
      medicalRate:0.20,
      childRate:0.20,
      limit:limit20
    };
  }

  return {
    label:"軽減なし",
    medicalRate:0,
    childRate:0,
    limit:0
  };
}

function calcPremium(person, reduction){
  const medicalEqualAfter =
    CONFIG.medicalEqual - Math.ceil(CONFIG.medicalEqual * reduction.medicalRate);

  const childEqualAfter =
    CONFIG.childEqual - Math.ceil(CONFIG.childEqual * reduction.childRate);

  const medicalIncome = Math.floor(person.taxableIncome * CONFIG.medicalRate);
  const childIncome = Math.floor(person.taxableIncome * CONFIG.childRate);

  const medicalBeforeFloor = Math.min(
    CONFIG.medicalLimit,
    medicalEqualAfter + medicalIncome
  );

  const childBeforeFloor = Math.min(
    CONFIG.childLimit,
    childEqualAfter + childIncome
  );

  const medical = floor100(medicalBeforeFloor);
  const child = floor100(childBeforeFloor);

  return {
    medicalEqualAfter,
    childEqualAfter,
    medicalIncome,
    childIncome,
    medical,
    child,
    total: medical + child
  };
}

function calculate(){
  const people = [
    readPerson("h", "世帯主", "checkbox"),
    readPerson("f1", "家族1", "auto"),
    readPerson("f2", "家族2", "auto")
  ];

  const validPeople = people.filter(p => p.age > 0);
  const insuredPeople = validPeople.filter(p => p.insured);

  if(num("h_age") <= 0){
    document.getElementById("result").innerHTML =
      "世帯主の年齢は必ず入力してください。";
    return;
  }

  if(insuredPeople.length === 0){
    document.getElementById("result").innerHTML =
      "被保険者がいません。世帯主を被保険者にするか、家族1・家族2の年齢を入力してください。";
    return;
  }

  const insuredCount = insuredPeople.length;
  const lightIncomeTotal = validPeople.reduce((sum,p)=>sum+p.lightIncome,0);
  const salaryPensionCount = validPeople.filter(p=>p.salaryPensionPerson).length;

  const reduction = getReduction(
    lightIncomeTotal,
    insuredCount,
    salaryPensionCount
  );

  let rows = "";
  let basisRows = "";
  let totalAll = 0;

  insuredPeople.forEach(p=>{
    const premium = calcPremium(p, reduction);
    totalAll += premium.total;

    rows += `
      <tr>
        <td>${p.name}</td>
        <td>${yen(p.totalIncome)}</td>
        <td>${yen(p.taxableIncome)}</td>
        <td>${yen(premium.medical)}</td>
        <td>${yen(premium.child)}</td>
        <td><strong>${yen(premium.total)}</strong></td>
      </tr>
    `;

    basisRows += `
      <tr>
        <td>${p.name}</td>
        <td>
          医療分：${yen(premium.medicalEqualAfter)} ＋ ${yen(p.taxableIncome)} × 10.48％
          ＝ ${yen(premium.medical)}<br>
          子ども分：${yen(premium.childEqualAfter)} ＋ ${yen(p.taxableIncome)} × 0.25％
          ＝ ${yen(premium.child)}
        </td>
      </tr>
    `;
  });

  document.getElementById("result").innerHTML = `
    <h2>試算結果</h2>

    <p><strong>均等割軽減判定：</strong>${reduction.label}</p>
    <p><strong>軽減判定所得金額の合計：</strong>${yen(lightIncomeTotal)}</p>
    <p><strong>世帯の被保険者数：</strong>${insuredCount}人</p>
    <p><strong>給与所得者等の人数：</strong>${salaryPensionCount}人</p>

    <table>
      <thead>
        <tr>
          <th>対象者</th>
          <th>所得金額</th>
          <th>所得割対象額</th>
          <th>医療分</th>
          <th>子ども分</th>
          <th>年間保険料</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr>
          <th colspan="5">世帯合計</th>
          <th class="total">${yen(totalAll)}</th>
        </tr>
      </tbody>
    </table>

    <div class="basis">
      <h3>計算根拠</h3>
      <table>
        <tbody>
          ${basisRows}
        </tbody>
      </table>
      <p class="small">
        医療分：均等割56,130円、所得割率10.48％、限度額850,000円。<br>
        子ども分：均等割1,362円、所得割率0.25％、限度額21,000円。<br>
        所得割対象額＝所得金額－基礎控除430,000円。<br>
        表示額は100円未満切り捨てです。
      </p>
    </div>

    <p class="small">
      ※この試算は概算です。実際の保険料額とは異なる場合があります。<br>
      ※損益通算、損失の繰越控除、専従者控除、譲渡所得の特別控除、元被扶養者軽減などがある場合は、この簡易版では正確に試算できない場合があります。
    </p>
  `;
}
</script>

</body>
</html>
