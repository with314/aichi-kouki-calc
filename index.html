<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>愛知県 後期高齢者医療保険料試算 令和8年度</title>

<style>
body{
  font-family: system-ui, sans-serif;
  background:#f5f7fa;
  margin:0;
  padding:20px;
  color:#222;
}
.container{
  max-width:900px;
  margin:auto;
  background:white;
  padding:24px;
  border-radius:12px;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
}
h1{
  font-size:24px;
  border-left:6px solid #2b6cb0;
  padding-left:12px;
}
.notice{
  background:#fff8e1;
  padding:12px;
  border-left:5px solid #f0b429;
  margin:16px 0;
}
.card{
  border:1px solid #ddd;
  border-radius:10px;
  padding:16px;
  margin:16px 0;
  background:#fafafa;
}
.grid{
  display:grid;
  grid-template-columns:180px 1fr;
  gap:10px;
  align-items:center;
}
input{
  padding:10px;
  font-size:16px;
}
button{
  width:100%;
  padding:14px;
  font-size:18px;
  font-weight:bold;
  background:#2b6cb0;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}
.result{
  margin-top:20px;
  padding:16px;
  background:#eef6ff;
  border-radius:10px;
}
table{
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}
th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:right;
}
th{
  background:#e8eef7;
}
td:first-child,th:first-child{
  text-align:left;
}
.small{
  font-size:13px;
  color:#555;
}
@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>
<div class="container">

<h1>愛知県 後期高齢者医療保険料試算（令和8年度）</h1>

<div class="notice">
この試算は概算です。実際の保険料額とは異なる場合があります。<br>
100円未満を切り捨てて表示します。
</div>

<div class="card">
  <h2>世帯主</h2>
  <div class="grid">
    <label>年齢</label>
    <input type="number" id="h_age" value="80">

    <label>年金収入（年額）</label>
    <input type="number" id="h_pension" value="1680000">

    <label>給与収入（年額）</label>
    <input type="number" id="h_salary" value="0">

    <label>その他の所得（年額）</label>
    <input type="number" id="h_other" value="0">

    <label>被保険者</label>
    <input type="checkbox" id="h_insured" checked>
  </div>
</div>

<div class="card">
  <h2>家族1（被保険者）</h2>
  <div class="grid">
    <label>年齢</label>
    <input type="number" id="f1_age">

    <label>年金収入（年額）</label>
    <input type="number" id="f1_pension" value="0">

    <label>給与収入（年額）</label>
    <input type="number" id="f1_salary" value="0">

    <label>その他の所得（年額）</label>
    <input type="number" id="f1_other" value="0">

    <label>被保険者として計算</label>
    <input type="checkbox" id="f1_insured">
  </div>
</div>

<div class="card">
  <h2>家族2（被保険者）</h2>
  <div class="grid">
    <label>年齢</label>
    <input type="number" id="f2_age">

    <label>年金収入（年額）</label>
    <input type="number" id="f2_pension" value="0">

    <label>給与収入（年額）</label>
    <input type="number" id="f2_salary" value="0">

    <label>その他の所得（年額）</label>
    <input type="number" id="f2_other" value="0">

    <label>被保険者として計算</label>
    <input type="checkbox" id="f2_insured">
  </div>
</div>

<button onclick="calculate()">試算する</button>

<div id="result" class="result">
ここに試算結果が表示されます。
</div>

<p class="small">
令和8年度料率：医療分 所得割率10.48％・均等割56,130円、子ども分 所得割率0.25％・均等割1,362円。
</p>

</div>

<script>
const CONFIG = {
  medicalEqual: 56130,
  medicalRate: 0.1048,
  medicalLimit: 850000,

  childEqual: 1362,
  childRate: 0.0025,
  childLimit: 21000,

  basicDeduction: 430000
};

function num(id){
  return Number(document.getElementById(id).value || 0);
}

function checked(id){
  return document.getElementById(id).checked;
}

function yen(n){
  return Math.floor(n).toLocaleString() + "円";
}

function floor100(n){
  return Math.floor(n / 100) * 100;
}

function salaryIncome(revenue){
  if(revenue <= 550000) return 0;
  if(revenue <= 1618999) return revenue - 550000;
  if(revenue <= 1619999) return 1069000;
  if(revenue <= 1621999) return 1070000;
  if(revenue <= 1623999) return 1072000;
  if(revenue <= 1627999) return 1074000;

  const r = Math.floor(revenue / 4000) * 4000;

  if(revenue <= 1799999) return r * 0.6 + 100000;
  if(revenue <= 3599999) return r * 0.7 - 80000;
  if(revenue <= 6599999) return r * 0.8 - 440000;
  if(revenue <= 8499999) return revenue * 0.9 - 1100000;

  return revenue - 1950000;
}

function pensionIncome(age, revenue){
  if(revenue <= 0) return 0;

  if(age >= 65){
    if(revenue <= 1100000) return 0;
    if(revenue <= 3300000) return revenue - 1100000;
    if(revenue <= 4100000) return revenue * 0.75 - 275000;
    if(revenue <= 7700000) return revenue * 0.85 - 685000;
    if(revenue <= 10000000) return revenue * 0.95 - 1455000;
    return revenue - 1955000;
  }

  if(revenue <= 600000) return 0;
  if(revenue <= 1300000) return revenue - 600000;
  if(revenue <= 4100000) return revenue * 0.75 - 275000;
  if(revenue <= 7700000) return revenue * 0.85 - 685000;
  if(revenue <= 10000000) return revenue * 0.95 - 1455000;
  return revenue - 1955000;
}

function readPerson(prefix, name){
  const age = num(prefix + "_age");
  const pension = num(prefix + "_pension");
  const salary = num(prefix + "_salary");
  const other = num(prefix + "_other");
  const insured = checked(prefix + "_insured");

  const pIncome = pensionIncome(age, pension);
  const sIncome = salaryIncome(salary);
  const totalIncome = Math.max(0, pIncome + sIncome + other);
  const taxableIncome = Math.max(0, totalIncome - CONFIG.basicDeduction);

  return {
    name,
    age,
    pension,
    salary,
    other,
    insured,
    pIncome,
    sIncome,
    totalIncome,
    taxableIncome
  };
}

function calcPremium(person){
  const medicalIncome = person.taxableIncome * CONFIG.medicalRate;
  const childIncome = person.taxableIncome * CONFIG.childRate;

  const medical = floor100(
    Math.min(CONFIG.medicalLimit, CONFIG.medicalEqual + medicalIncome)
  );

  const child = floor100(
    Math.min(CONFIG.childLimit, CONFIG.childEqual + childIncome)
  );

  return {
    medicalIncome,
    childIncome,
    medical,
    child,
    total: medical + child
  };
}

function calculate(){
  const people = [
    readPerson("h", "世帯主"),
    readPerson("f1", "家族1"),
    readPerson("f2", "家族2")
  ];

  const insuredPeople = people.filter(p => p.age > 0 && p.insured);

  if(insuredPeople.length === 0){
    document.getElementById("result").innerHTML =
      "年齢を入力し、被保険者にチェックを入れてください。";
    return;
  }

  let rows = "";
  let totalAll = 0;

  insuredPeople.forEach(p => {
    const premium = calcPremium(p);
    totalAll += premium.total;

    rows += `
      <tr>
        <td>${p.name}</td>
        <td>${yen(p.totalIncome)}</td>
        <td>${yen(p.taxableIncome)}</td>
        <td>${yen(p.medical || premium.medical)}</td>
        <td>${yen(p.child || premium.child)}</td>
        <td><strong>${yen(premium.total)}</strong></td>
      </tr>
    `;
  });

  document.getElementById("result").innerHTML = `
    <h2>試算結果</h2>
    <table>
      <thead>
        <tr>
          <th>対象者</th>
          <th>所得金額</th>
          <th>所得割対象額</th>
          <th>医療分</th>
          <th>子ども分</th>
          <th>年間保険料</th>
        </tr>
      </thead>
      <tbody>
        ${rows}
        <tr>
          <th colspan="5">合計</th>
          <th>${yen(totalAll)}</th>
        </tr>
      </tbody>
    </table>

    <p class="small">
      ※この版は、まず医療分・子ども分の基本計算を反映した簡易版です。<br>
      ※均等割の7割・5割・2割軽減、令和8年度の7割軽減対象者への追加0.2割軽減、元被扶養者軽減などは次の段階で追加します。
    </p>
  `;
}
</script>

</body>
</html>
